name: Signsync
description: "Für alle, die täglich begleiten – nicht verwalten wollen."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  dio: ^5.4.0
  flutter_secure_storage: ^9.0.0
  provider: ^6.1.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/icon/


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png" # Pfad zu deinem Bild
  adaptive_icon_background: "#ffffff" # Hintergrundfarbe für Android
  adaptive_icon_foreground: "assets/icon/app_icon.png"